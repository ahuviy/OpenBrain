# Open Brain on Fly.io
#
# Deploys the Open Brain MCP + REST server to a single Fly machine.
# Bring your own Postgres (Supabase, Neon, Railway, Fly Postgres).
#
# Usage:
#   fly auth login
#   fly launch --copy-config --no-deploy --name openbrain-<your-handle>
#   fly secrets set DATABASE_URL='postgresql://...' \
#                   MCP_ACCESS_KEY="$(openssl rand -hex 32)" \
#                   EMBEDDER_PROVIDER=openrouter \
#                   OPENROUTER_API_KEY='sk-or-...' \
#                   EMBEDDING_DIMENSIONS=1536
#   fly deploy
#
# See docs/12-HOSTED-CHEAP.md for the full walkthrough.

app = "openbrain"
primary_region = "iad"   # change to one close to you and your DB

[build]
  # Build from the repo root. Run `fly deploy` from there, or use
  # `fly deploy --config deploy/hosted/fly/fly.toml --dockerfile Dockerfile`.
  dockerfile = "Dockerfile"

[env]
  API_PORT = "8000"
  MCP_PORT = "8080"
  LOG_LEVEL = "info"
  # EMBEDDER_PROVIDER, EMBEDDING_DIMENSIONS, DATABASE_URL,
  # MCP_ACCESS_KEY and any provider keys are set via `fly secrets`.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"   # ~1 sec wake-up; stays in the free allowance
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

# Expose the REST API on a second port (optional — most users only need /sse on 8080).
[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = "suspend"
  auto_start_machines = true

  [[services.ports]]
    port = 8000
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
